          <div style={{background:rc.bg,padding:"4px 8px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontFamily:"'Space Grotesk'",fontWeight:700,fontSize:11,color:rc.hd}}>#{t.seed} {t.team} <span style={{fontSize:8,fontWeight:400,color:rc.tx}}>{t.rec} · {t.conf} · KP#{t.kp}</span></span>
            <div style={{display:"flex",gap:4,alignItems:"center"}}>
              <span style={{fontSize:7,padding:"1px 4px",borderRadius:2,background:pb.bg,color:pb.c,border:`1px solid ${pb.c}30`}}>{pb.txt}</span>
              <span style={{fontSize:9,color:c.c}}>{t.odds}</span>
            </div>
          </div>
          {t.inj&&<div style={{padding:"2px 8px",fontSize:8,color:"#f85149",background:"rgba(248,81,73,.06)"}}>⚠️ {t.inj}</div>}
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:9}}>
            <thead><tr style={{background:"#0d1117"}}>{["Player","Pos","Yr","PPG","RPG","APG","Notes"].map(h=><th key={h} style={{padding:"3px 6px",textAlign:"left",color:"#8b949e",fontSize:7,borderBottom:"1px solid #21262d"}}>{h}</th>)}</tr></thead>
            <tbody>{t.players.map(p=><tr key={p.n} className="R" style={{borderBottom:"1px solid #21262d"}}>
              <td style={{padding:"2px 6px",fontWeight:600,color:"#c9d1d9"}}>{p.n}</td>
              <td style={{padding:"2px 6px",color:"#8b949e"}}>{p.pos}</td><td style={{padding:"2px 6px",color:"#8b949e"}}>{p.yr}</td>
              <td style={{padding:"2px 6px",color:p.ppg>=18?"#f6e05e":p.ppg>=14?"#3fb950":"#c9d1d9",fontWeight:p.ppg>=18?700:400}}>{p.ppg}</td>
              <td style={{padding:"2px 6px",color:p.rpg>=7?"#3fb950":"#c9d1d9"}}>{p.rpg}</td>
              <td style={{padding:"2px 6px",color:p.apg>=5?"#58a6ff":"#c9d1d9"}}>{p.apg}</td>
              <td style={{padding:"2px 6px",fontSize:7,color:"#8b949e",maxWidth:180}}>{p.note}</td>
            </tr>)}</tbody>
          </table>
        </div>})}
    </div>}

    {/* ═══ PORTFOLIO ═══ */}
    {tab==="Portfolio"&&<div>
      <div style={{background:"#161b22",border:"1px solid #30363d",borderRadius:4,padding:10,marginBottom:8}}>
        <h3 style={{fontFamily:"'Space Grotesk'",fontSize:12,color:"#f0f6fc",marginBottom:5}}>Portfolio Builder</h3>
        <div style={{display:"flex",gap:3,alignItems:"center",marginBottom:8}}>
          <select onChange={e=>{const t=teams.find(x=>x.team===e.target.value);if(t)addP(t);e.target.value=""}} defaultValue="">
            <option value="" disabled>+ Add team...</option>
            {teams.filter(t=>!port.find(p=>p.team===t.team)).sort((a,b)=>a.seed-b.seed).map(t=>{const pb=profileBadge(t);return <option key={t.team} value={t.team}>#{t.seed} {t.team} ({t.region}) {t.coachE8&&t.confChamp?"✓✓":""}</option>})}
          </select>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:4,marginBottom:8}}>
          {[{l:"Total Spend",v:`$${totS.toLocaleString()}`,c:totS>90000?"#f85149":"#3fb950"},{l:"Est. EV",v:`$${Math.round(totE).toLocaleString()}`,c:"#58a6ff"},{l:"Teams",v:port.length,c:"#f6e05e"},{l:"ROI",v:`${totS>0?((totE/totS-1)*100).toFixed(0):"0"}%`,c:totE>totS?"#3fb950":"#f85149"}].map(s=>
            <div key={s.l} style={{background:"#0d1117",border:"1px solid #21262d",borderRadius:3,padding:6,textAlign:"center"}}>
              <div style={{fontSize:7,color:"#8b949e",textTransform:"uppercase"}}>{s.l}</div>
              <div style={{fontSize:14,fontWeight:700,color:s.c,fontFamily:"'Space Grotesk'"}}>{s.v}</div></div>)}
        </div>
      </div>
      {port.length===0?<div style={{textAlign:"center",padding:20,color:"#484f58",fontSize:11}}>No teams yet. Add via dropdown or + on Full Bracket.</div>:
      <div style={{background:"#161b22",border:"1px solid #30363d",borderRadius:4,overflow:"auto"}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:9}}>
          <thead><tr style={{background:"#0d1117"}}>{["Team","Sd","Rgn","Profile","Odds","EV","Bid $","Own%","Adj EV","Net",""].map(h=><th key={h} style={{padding:"3px 5px",textAlign:"left",color:"#8b949e",fontSize:7,borderBottom:"1px solid #21262d"}}>{h}</th>)}</tr></thead>
          <tbody>{port.map(p=>{const e=calcEV(p);const ae=Math.round(e*(p.own/100));const n=ae-p.bid;const c=TC[p.tier]||{c:"#8b949e"};const pb=profileBadge(p);
            return <tr key={p.team} style={{borderBottom:"1px solid #21262d"}}>
              <td style={{padding:"3px 5px",fontWeight:600,color:c.c}}>{p.team}{p.inj?" ⚠️":""}</td>
              <td style={{padding:"3px 5px",color:"#8b949e"}}>{p.seed}</td>
              <td style={{padding:"3px 5px",color:RC[p.region].hd}}>{p.region}</td>
              <td style={{padding:"3px 5px"}}><span style={{fontSize:7,color:pb.c}}>{pb.txt}</span></td>
              <td style={{padding:"3px 5px"}}>{p.odds}</td>
              <td style={{padding:"3px 5px",color:"#3fb950"}}>${e.toLocaleString()}</td>
              <td style={{padding:"3px 5px"}}><input type="number" value={p.bid||""} onChange={e=>upP(p.team,"bid",e.target.value)} style={{width:60}}/></td>
              <td style={{padding:"3px 5px"}}><input type="number" value={p.own} onChange={e=>upP(p.team,"own",e.target.value)} min={0} max={100} style={{width:38}}/><span style={{color:"#484f58",fontSize:8}}>%</span></td>
              <td style={{padding:"3px 5px",color:"#58a6ff",fontWeight:600}}>${ae.toLocaleString()}</td>
              <td style={{padding:"3px 5px",color:n>=0?"#3fb950":"#f85149",fontWeight:600}}>{n>=0?"+":""}${n.toLocaleString()}</td>
              <td style={{padding:"3px 5px"}}><button onClick={()=>rmP(p.team)} style={{background:"transparent",border:"none",color:"#f85149",cursor:"pointer",fontSize:11}}>×</button></td>
            </tr>})}</tbody>
          <tfoot><tr style={{background:"#0d1117"}}><td colSpan={5} style={{padding:"3px 5px",fontWeight:700,color:"#f0f6fc"}}>TOTALS</td>
            <td style={{padding:"3px 5px",color:"#3fb950"}}></td>
            <td style={{padding:"3px 5px",fontWeight:700,color:totS>90000?"#f85149":"#3fb950"}}>${totS.toLocaleString()}</td><td></td>
            <td style={{padding:"3px 5px",fontWeight:700,color:"#58a6ff"}}>${Math.round(totE).toLocaleString()}</td>
            <td style={{padding:"3px 5px",fontWeight:700,color:totE-totS>=0?"#3fb950":"#f85149"}}>{totE-totS>=0?"+":""}${Math.round(totE-totS).toLocaleString()}</td><td></td>
          </tr></tfoot>
        </table>
      </div>}
    </div>}

    {/* ═══ STRATEGY ═══ */}
    {tab==="Strategy"&&<div style={{display:"grid",gap:6}}>
      <SC t="🏆 Champion Profile Priority — Teams Passing BOTH Filters" c="#3fb950">{`PASS BOTH (Coach E8+ AND Conf Champ) — 89%+ of all champions since '97:
• Duke (+330) — Scheyer F4 '25, NPOY Boozer, Won ACC both ← #1 OVERALL SEED
• Michigan (+350) — #1 defense, May F4 '23, Big Ten reg champ ← TOP PICK
• Florida (+700) — Defending champ, Golden won it '25, SEC reg champ
• Purdue (+3500) — Painter F4+Title game, Big Ten tourney champ ← BEST VALUE
• Arkansas (+5000) — Calipari 2012 champ, SEC tourney champ ← SLEEPER VALUE
• St. John's (+5000) — Pitino 2x champ, Big East both ← UNDER-SEEDED
• Gonzaga (+5500) — Few title game '21, WCC champ (Huff doubtful reduces)

Key: These 7 teams represent the highest-probability champion pool by historical standards.`}</SC>
      <SC t="⚠️ Caveat Teams — Pass One Filter" c="#f6e05e">{`PASS COACH ONLY (no conf title — only 3/28 exceptions since '97):
• Houston (+1000) — Sampson multiple F4s. Lost Big 12 final. Rothstein F4.
• UConn (+1700) — Hurley B2B champ. Lost Big East final. UConn IS a prior exception breaker ('14, '23).
• Michigan St (+4000) — Izzo 2000 champ. No Big Ten title.
• Alabama (+10000) — Oats F4 '24. No SEC title.
• Tennessee (+9000) — Barnes F4 '03. No SEC title.
• Kansas (+5000) — Self '08 champ. No Big 12 title. Peterson health.

PASS CONF ONLY (no coach E8 — only 3/23 exceptions since '02, but weakening):
• Arizona (+400) — Lloyd no E8. Won Big 12 both. Healthiest team. NIL era caveat.`}</SC>
      <SC t="💰 Filter-Adjusted Bid Strategy" c="#58a6ff">{`TIER 1 — AGGRESSIVE ($40K+) — Both Filters:
• Michigan — ✓✓ Both + #1 defense + Rothstein F4 ← Bid up to $55K
• Purdue — ✓✓ Both + Rothstein CHAMPION + +3500 value ← Bid $30-40K
• Duke — ✓✓ Both + NPOY Boozer + Scheyer F4 '25. Brutal East draw. ← $35-50K

TIER 2 — STRONG ($25-40K) — One Filter + Elite Profile:
• Arizona — ✓ Conf only. Healthiest. Easiest path. NIL era play. ← $35-45K
• Houston — ✓ Coach only. Geographic edge. Rothstein F4. ← $25-35K
• Florida — ✓✓ Both. Defending champ. Pressure. ← $25-35K

TIER 3 — VALUE ($8-20K) — Strong Profile, Lower Seeds:
• Arkansas — ✓✓ Both + Acuff elite + Calipari ← $8-15K (STEAL if cheap)
• St. John's — ✓✓ Both + Pitino + under-seeded ← $8-15K
• Illinois — ✗✗ #1 offense but fails both ← $10-15K (talent bet, not profile)
• UConn — ✓ Coach + IS a conf champ exception ← $10-18K

AVOID at premium price:
• Nebraska — ✗✗ + 0-8 in 1st Rd + Rothstein picked Troy upset
• Iowa State — ✗✗ despite KenPom #3. Otzelberger no E8, no conf title.
• Virginia — ✗✗ Odom no E8, no ACC title.`}</SC>
      <SC t="⚠️ Injury Report" c="#f85149">{`Duke: Foster OUT + Ngongba ? · Michigan: Cason OUT · Arkansas: Saunders OUT (ACL)
Texas Tech: Toppin OUT (ACL) · UNC: Wilson + another OUT · Louisville: Brown ?
Gonzaga: Huff doubtful · UConn: Demary ankle · Kansas: Peterson cramping
Wisconsin: Winter health · BYU: Saunders OUT (ACL)`}</SC>
    </div>}

    {/* ═══ 2025 RECAP ═══ */}
    {tab==="2025 Recap"&&<div style={{display:"grid",gap:8}}>
      <div style={{background:"#161b22",border:"1px solid #30363d",borderRadius:4,padding:12}}>
        <h3 style={{fontFamily:"'Space Grotesk'",fontSize:12,color:"#f0f6fc",marginBottom:6}}>2025 — Team SRU ($87K spend, -$242 result)</h3>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:4}}>
          {[{t:"Duke",s:1,r:"East",c:37000},{t:"Michigan St",s:2,r:"South",c:36000},{t:"Missouri",s:6,r:"West",c:9500},{t:"UCLA",s:7,r:"Midwest",c:4500}].map(t=><div key={t.t} style={{background:"#0d1117",border:"1px solid #21262d",borderRadius:3,padding:5}}>
            <div style={{fontWeight:600,color:"#c9d1d9",fontSize:10}}>#{t.s} {t.t}</div><div style={{fontSize:8,color:"#8b949e"}}>{t.r} · ${t.c.toLocaleString()}</div></div>)}
        </div>
      </div>
      <div style={{background:"#161b22",border:"1px solid #30363d",borderRadius:4,padding:12}}>
        <h4 style={{fontSize:9,color:"#8b949e",marginBottom:5}}>SYNDICATES</h4>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(100px,1fr))",gap:4}}>
          {[{n:"DT6",s:104,t:14},{n:"SRU",s:87,t:4},{n:"Gainey",s:79,t:9},{n:"Black",s:76,t:17},{n:"Miranda",s:67,t:6},{n:"Martin",s:59,t:5},{n:"Shaw",s:59,t:8},{n:"Casualty",s:31,t:1}].map(s=><div key={s.n} style={{background:"#0d1117",border:"1px solid #21262d",borderRadius:3,padding:5}}>
            <div style={{fontWeight:600,color:s.n==="SRU"?"#58a6ff":"#c9d1d9",fontSize:10}}>{s.n}</div>
            <div style={{fontSize:12,color:"#3fb950",fontWeight:600}}>${s.s}K</div>
            <div style={{fontSize:7,color:"#8b949e"}}>{s.t} teams</div></div>)}
        </div>
      </div>
    </div>}
  </div>);
}
function SC({t,c,children}){return <div style={{background:"#161b22",border:`1px solid ${c}20`,borderRadius:4,padding:10}}><h3 style={{fontFamily:"'Space Grotesk'",fontSize:11,color:c,marginBottom:5}}>{t}</h3><div style={{fontSize:9,color:"#c9d1d9",lineHeight:1.6,whiteSpace:"pre-line"}}>{children}</div></div>}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
